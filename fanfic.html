<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9-Month Chronicle | Fanfics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600&family=Playfair+Display:ital,wght=0,400;0,600;1,400&family=Reenie+Beanie&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --scaling-factor: 1; 
            --bg-color: #FAF7F2;
            --card-bg: #FFFFFF;
            --text-dark: #1E293B;
            --text-muted: #9CA3AF;
            --accent: #D6AF37;
        }
        html, body {
            margin: 0; padding: 0; background-color: #FAF7F2;
            font-family: 'Inter', sans-serif; line-height: 1.5;
            padding: calc(40px * var(--scaling-factor)) calc(20px * var(--scaling-factor)) calc(80px * var(--scaling-factor)) calc(20px * var(--scaling-factor));
        }

        .floating-nav {
            display: flex;
            justify-content: center;
            gap: 20px; margin-bottom: 30px; 
        }
        .nav-link {
            text-decoration: none;
            color: #1E293B;
            font-weight: 500;
        }
        .nav-link.active {
            color: #D6AF37;
        }
        
        .page-header { 
            text-align: center;
            margin-bottom: 40px;
        }
        .page-subtitle {
            color: #64748B; 
            font-size: 1.1rem;
        }

        .fanfic-container {
            max-width: calc(760px * var(--scaling-factor));
            margin: 0 auto;
        }
        .fanfic-card {
            background: #FFFFFF;
            border-radius: 6px;
            box-shadow: 0 25px 70px rgba(15, 23, 42, 0.08);
            padding: 30px;
            display: flex;
            gap: 25px;
            align-items: flex-start; 
        }
        .thumbnail {
            width: 120px;
            height: 160px;
            background: #E2E8F0;
            border-radius: 4px;
            flex-shrink: 0;
            object-fit: cover;
        }
        .fanfic-info h2 {
            font-family: 'Playfair Display', serif;
            margin: 0 0 10px 0;
        }
        .chapter-item {
            margin-bottom: 8px;
        }

        .chapter-link {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 500;
            transition: color 0.3s;
        }

        .chapter-link:hover { color: var(--accent); }

        .btn-start {
            display: inline-block;
            background: var(--text-dark);
            color: var(--bg-color);
            padding: 10px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 0.9rem;
            margin-top: 15px;
            transition: background 0.3s;
        }

        .btn-start:hover { background: var(--accent); color: white; }
    </style>
</head>
<body>

    <nav class="floating-nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="gallery.html" class="nav-link">Gallery</a>
        <a href="videos.html" class="nav-link">Videos</a>
        <a href="streak.html" class="nav-link">Daily Journal</a>
        <a href="messages.html" class="nav-link">Messages</a>
        <a href="fanfic.html" class="nav-link active">Fanfics</a>
    </nav>

    <header class="page-header">
        <h1>Stories & Fanfics</h1>
        <p class="page-subtitle">Geschichten, die wir geschrieben haben – für die Ewigkeit festgehalten.</p>
    </header>

    <main class="fanfic-container">
        <div class="fanfic-card">
            <img class="thumbnail" src="" alt="Fanfic Cover">
            <div class="fanfic-info">
                <h2>9 Months⭐</h2>
                <ul id="chapterList" style="list-style: none; padding: 0;"></ul>
                <a href="chapter1.html" class="btn-start">Start Reading Chapter 1</a>
            </div>
        </div>
    </main>

    <script>
        function updateScaling() {
            const factor = window.innerWidth / (window.innerWidth < 768 ? 430 : 1440);
            document.documentElement.style.setProperty('--scaling-factor', factor);
        }
        window.addEventListener('resize', updateScaling);
        updateScaling();

        const chapters = ["Her Arival", "Coming Soon", "Coming Soon", "Coming Soon", "Coming Soon"];
        const listContainer = document.getElementById('chapterList');
        chapters.forEach((title, i) => {
            listContainer.innerHTML += `<li style="margin-bottom: 8px;"><a href="#" class="chapter-link">Chapter ${i+1}: ${title}</a></li>`;
        });
    </script>
</body>
</html>

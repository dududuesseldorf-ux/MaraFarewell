    <style>
        :root {
            --scaling-factor: 1;
        }

        html, body {
            margin: 0;
            padding: 0;
            background-color: #FAF7F2;
            min-height: 4000vh; 
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
            line-height: 1.5;
            padding: calc(40px * var(--scaling-factor)) calc(20px * var(--scaling-factor)) calc(80px * var(--scaling-factor)) calc(20px * var(--scaling-factor));
        }

        #stage-3d {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none; 
            z-index: 1; 
        }

        #universe-3d-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 2;
        }

        .content-container {
            max-width: calc(760px * var(--scaling-factor));
            margin: 0 auto;
        }

        .photo-33d-wrapper { display: none; }
        .photo-33d-container { display: none; }

        .photo-3d-element {
            position: fixed;
            background: #FFFFFF;
            padding: 20px 20px 36px 20px;
            box-shadow: 0 25px 70px rgba(15, 23, 42, 0.15);
            border-radius: 6px;
            width: 380px; 
            cursor: pointer;
            user-select: none;
            transform-origin: center;
            will-change: transform, opacity, left, top;
            display: flex;
            flex-direction: column;
            transition: box-shadow 0.3s;
            pointer-events: auto; 
        }

        @media (max-width: 480px) {
            .photo-3d-element {
                width: 290px; 
            }
        }

        .photo-3d-element:hover {
            box-shadow: 0 35px 80px rgba(214, 175, 55, 0.4);
        }

        .img-container-3d {
            width: 100%;
            aspect-ratio: 4 / 3; 
            overflow: hidden;
            background-color: #F3EFE6;
        }

        .img-container-3d img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        .caption-3d {
            font-family: 'Reenie Beanie', cursive;
            font-size: 35px; 
            color: #1E293B;
            text-align: center;
            margin-top: 16px;
            line-height: 1.1;
        }

        .photo-3d-element.inspected {
            position: fixed !important;
            top: 50% !important;
            left: 50% !important;
            transform: translate(-50%, -50%) scale(1.15) rotate(0deg) !important;
            z-index: 999999 !important; 
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.4);
        }

        .reveal-overlay-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 5; 
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .revealed-name {
            font-family: 'Playfair Display', serif;
            font-weight: 400;
            font-size: calc(80px * var(--scaling-factor));
            color: #1E293B;
            letter-spacing: calc(15px * var(--scaling-factor));
            opacity: 0;
            transform: scale(0.5);
            will-change: transform, opacity, filter;
            transition: transform 1.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 1.2s ease, filter 1.2s ease;
            filter: blur(15px);
            margin-left: calc(15px * var(--scaling-factor));
            text-align: center;
            text-shadow: 0 calc(10px * var(--scaling-factor)) calc(40px * var(--scaling-factor)) rgba(0,0,0,0.06);
        }

        @media (min-width: 768px) {
            .revealed-name {
                font-size: calc(140px * var(--scaling-factor));
                letter-spacing: calc(35px * var(--scaling-factor));
                margin-left: calc(35px * var(--scaling-factor));
            }
        }

        .revealed-name.active {
            opacity: 1;
            transform: scale(1);
            filter: blur(0px);
        }

        #raw-source-data { display: none; }
    </style>
</head>

    <script>
        function updateScaling() {
            const baseWidth = window.innerWidth < 768 ? 430 : 1440;
            const factor = window.innerWidth / baseWidth;
            document.documentElement.style.setProperty('--scaling-factor', factor);
        }
        window.addEventListener('resize', updateScaling);
        window.addEventListener('DOMContentLoaded', updateScaling);
        updateScaling();

        const canvas = document.getElementById("stage-3d");
        const ctx = canvas.getContext("2d");
        const universe = document.getElementById("universe-3d-container");
        const rawData = document.querySelectorAll("#raw-source-data div");
        const finaleText = document.getElementById("finale-text");

        let hearts = [];
        let photos3D = [];
        let lastScrollY = window.scrollY;
        let heartClickCount = 0;
        let heroHeartBeatScale = 0;
        const totalPhotos = rawData.length;
        let columns = 3;
        let totalMaxTunnelDepth = 400 + (totalPhotos * 650); // Dynamisch gemacht
        
        const scrollThreshold = 100; 
        let hasResetAtTop = false;

        function calculateLayoutMetrics() {
            const w = window.innerWidth;
            if (w < 768) columns = 1;
            else if (w < 1200) columns = 2;
            else columns = 3;
        }

        function resizeStage() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            calculateLayoutMetrics();
            totalMaxTunnelDepth = 400 + (totalPhotos * 650); // Aktualisiert bei Resize
        }
        window.addEventListener("resize", resizeStage);
        resizeStage();

        function getSafeScreenPosition(index, elWidth, elHeight, randX, randY) {
            const centerAreaHeight = window.innerHeight * 0.50; 
            const topOffset = (window.innerHeight - centerAreaHeight) / 2; 
            const sidePadding = 40;
            const usableWidth = window.innerWidth - (sidePadding * 2);
            const col = index % columns;
            const laneWidth = usableWidth / columns;

            const targetX = sidePadding + (col * laneWidth) + (randX * (laneWidth - elWidth * 0.8));
            const targetY = topOffset + (randY * (centerAreaHeight - elHeight * 0.8));

            return { x: targetX + (elWidth / 2), y: targetY + (elHeight / 2) };
        }

        function getEngineColor(count) {
            if (count >= 10) return "rgba(239, 68, 68, ";
            const r = Math.floor(214 + (25 * (count / 10)));
            const g = Math.floor(175 - (131 * (count / 10)));
            const b = Math.floor(55 + (13 * (count / 10)));
            return `rgba(${r}, ${g}, ${b}, `;
        }

        class HeartObject3D {
            constructor(spawnSpread = false) {
                this.reset();
                if (spawnSpread) {
                    this.z = Math.random() * 2000;
                    this.y = Math.random() * canvas.height;
                    this.x = Math.random() * canvas.width;
                }
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.z = 2000; 
                this.baseSize = Math.random() * 15 + 20; 
                this.driftX = (Math.random() - 0.5) * 0.3;
                this.driftY = (Math.random() - 0.5) * 0.3;
            }
            update(scrollDelta, maxTunnelDepth, isEnding) {
                if (isEnding) {
                    this.z -= 1.0; 
                    this.x += this.driftX;
                    this.y += this.driftY;
                    if (this.z <= 5) this.reset();
                    return;
                }
                
                if (window.scrollY < scrollThreshold) return;

                const baselineSpeed = 2.5; 
                const responsiveSpeed = scrollDelta * 0.65;
                this.z -= (baselineSpeed + responsiveSpeed);
                if (this.z <= 10) this.reset();
                if (this.z > maxTunnelDepth) this.z = 10;
            }
            draw() {
                if (this.z > 900) return; 
                const scale = 300 / this.z;
                const projX = (this.x - canvas.width / 2) * scale + canvas.width / 2;
                const projY = (this.y - canvas.height / 2) * scale + canvas.height / 2;
                const finalSize = this.baseSize * scale; 
                const alpha = Math.min(Math.max((900 - this.z) / 600, 0), 0.4); 
                const colorPrefix = getEngineColor(heartClickCount);

                ctx.save();
                ctx.translate(projX, projY);
                ctx.shadowBlur = 18;
                ctx.shadowColor = colorPrefix + "0.6)";
                ctx.fillStyle = colorPrefix + `${alpha})`;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-finalSize / 2, -finalSize / 2, -finalSize, +finalSize / 3, 0, finalSize);
                ctx.bezierCurveTo(finalSize, +finalSize / 3, finalSize / 2, -finalSize / 2, 0, 0);
                ctx.fill();
                ctx.restore();
            }
        }

        class PhotoObject3D {
            constructor(domElement, index) {
                this.el = domElement;
                this.index = index;
                this.initialZ = 400 + (index * 650); 
                this.z = this.initialZ;
                this.rotation = (Math.random() - 0.5) * 16;
                this.orbitRadius = 80 + Math.random() * 180;
                this.orbitSpeed = 0.008 + Math.random() * 0.015;
                this.orbitAngle = Math.random() * Math.PI * 2;
                this.orbitYPhase = Math.random() * Math.PI;
                this.randX = Math.random();
                this.randY = Math.random();
            }

            update(currentScroll, collapseProgress) {
                if (this.el.classList.contains('inspected')) return;
                
                const cardWidth = window.innerWidth < 480 ? 290 : 380;
                const cardHeight = cardWidth * 0.85;

                if (currentScroll < scrollThreshold) {
                    this.el.style.display = 'none';
                    return;
                }

                const activeScrollDelta = currentScroll - scrollThreshold;
                this.z = this.initialZ - (activeScrollDelta * 0.9);
                let finalOpacity = 1;

                if (collapseProgress > 0) {
                    this.el.style.opacity = '0';
                    this.el.style.display = 'none';
                } else {
                    if (this.z <= 15 || this.z > 1700) {
                        this.el.style.display = 'none';
                        return;
                    }
                    if (this.z > 1300) finalOpacity = (1700 - this.z) / 400; 
                    if (this.z < 180) finalOpacity = (this.z - 15) / 165;

                    const fovScale = 350 / this.z;
                    
                    const pos = getSafeScreenPosition(this.index, cardWidth, cardHeight, this.randX, this.randY);
                    const posX = (pos.x - window.innerWidth / 2) * fovScale + window.innerWidth / 2;
                    const posY = (pos.y - window.innerHeight / 2) * fovScale + window.innerHeight / 2;
                    
                    this.el.style.left = `${posX - (cardWidth / 2)}px`;
                    this.el.style.top = `${posY - (cardHeight / 2)}px`;
                    this.el.style.transform = `scale(${fovScale * 0.8}) rotate(${this.rotation}deg)`;
                    this.el.style.opacity = Math.max(0, Math.min(finalOpacity, 1));
                    this.el.style.zIndex = Math.floor(15000 - this.z);
                    this.el.style.display = 'flex';
                }
            }

            drawAsSwarmParticle(progress) {
                if (progress <= 0) return;
                this.orbitAngle += this.orbitSpeed;
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                const pullInFactor = 1 - (progress * 0.6); 
                const currentRadius = this.orbitRadius * pullInFactor;
                const pX = centerX + Math.cos(this.orbitAngle) * currentRadius;
                const pY = centerY + Math.sin(this.orbitAngle + this.orbitYPhase) * (currentRadius * 0.4);
                const pointSize = Math.max(2, 5 * (1 - progress));
                const pointAlpha = Math.min(progress, 1 - (progress * 0.4));
                const colorPrefix = getEngineColor(heartClickCount);

                ctx.save();
                ctx.beginPath();
                ctx.arc(pX, pY, pointSize, 0, Math.PI * 2);
                ctx.fillStyle = colorPrefix + `${pointAlpha})`;
                ctx.shadowBlur = 8;
                ctx.shadowColor = heartClickCount >= 10 ? "#EF4444" : "#D6AF37";
                ctx.fill();
                ctx.restore();
            }
        }

        rawData.forEach((src, idx) => {
            const div = document.createElement("div");
            div.className = "photo-3d-element";
            div.innerHTML = `
                <div class="img-container-3d"><img src="${src.dataset.img}"></div>
                <p class="caption-3d">${src.dataset.cap}</p>
            `;
            universe.appendChild(div);
            photos3D.push(new PhotoObject3D(div, idx));

            div.addEventListener("click", (e) => {
                e.stopPropagation();
                if (div.classList.contains("inspected")) {
                    div.classList.remove("inspected");
                } else {
                    document.querySelectorAll(".photo-3d-element").forEach(p => p.classList.remove("inspected"));
                    div.classList.add("inspected");
                }
            });
        });

        window.addEventListener("pointerdown", () => {
            document.querySelectorAll(".photo-3d-element").forEach(p => p.classList.remove("inspected"));
        });

        for (let i = 0; i < 45; i++) hearts.push(new HeartObject3D(true));
        let collapseVal = 0;

        function drawFinalHeroHeart(progress) {
            if (progress <= 0) return;
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const baseRadius = 140;
            const targetHeartSize = (baseRadius + heroHeartBeatScale) * progress;
            const alpha = Math.min(progress * 0.95, 0.95);
            const colorPrefix = getEngineColor(heartClickCount);

            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.shadowBlur = 50;
            ctx.shadowColor = colorPrefix + `${progress})`;
            ctx.fillStyle = colorPrefix + `${alpha})`;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(-targetHeartSize / 2, -targetHeartSize / 2, -targetHeartSize, +targetHeartSize / 3, 0, targetHeartSize);
            ctx.bezierCurveTo(targetHeartSize, +targetHeartSize / 3, targetHeartSize / 2, -targetHeartSize / 2, 0, 0);
            ctx.fill();
            ctx.restore();
        }

        window.addEventListener("pointerdown", (e) => {
            if (collapseVal < 0.5) return; 
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            const clickDist = Math.hypot(e.clientX - centerX, e.clientY - centerY);
            if (clickDist < 180) {
                heartClickCount++;
                heroHeartBeatScale = 60; 
            }

            if (heartClickCount >= 10) {
                hearts.forEach(heart => {
                    heart.reset();
                    heart.z = Math.random() * 2000;
                });

                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });

                setTimeout(() => {
                    heartClickCount = 0;
                    collapseVal = 0;
                    finaleText.classList.remove("active");
                }, 1200);             
            }
        });

        function runEngine() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const currentScroll = window.scrollY;

            if (currentScroll === 0) {
                if (!hasResetAtTop) {
                    hearts.forEach(heart => {
                        heart.reset();
                        heart.z = Math.random() * 2000;
                    });
                    hasResetAtTop = true;
                }
            } else {
                hasResetAtTop = false;
            }

            const finalPhotoItem = photos3D[totalPhotos - 1];
            let isEnding = false;

            if (finalPhotoItem && finalPhotoItem.z <= 15) {
                isEnding = true;
                if (collapseVal < 1) {
                    collapseVal += 0.04;
                    if (collapseVal > 1) collapseVal = 1;
                }
                if (collapseVal > 0.5) {
                    finaleText.classList.add("active");
                }
            } else {
                if (collapseVal > 0) {
                    collapseVal -= 0.08;
                    if (collapseVal < 0) collapseVal = 0;
                }
                if (collapseVal === 0) {
                    finaleText.classList.remove("active");
                }
            }

            if (heroHeartBeatScale > 0) {
                heroHeartBeatScale -= heroHeartBeatScale * 0.10;
                if (heroHeartBeatScale < 0.1) heroHeartBeatScale = 0;
            }

            photos3D.forEach(photo => photo.update(currentScroll, collapseVal));
            
            let scrollDelta = 0;
            if (currentScroll >= scrollThreshold) {
                const adjustedCurrent = currentScroll - scrollThreshold;
                const adjustedLast = Math.max(0, lastScrollY - scrollThreshold);
                scrollDelta = adjustedCurrent - adjustedLast;
            }
            lastScrollY = currentScroll;
            if (Math.abs(scrollDelta) < 0.05) scrollDelta = 0;

            hearts.forEach(heart => {
                heart.update(scrollDelta, totalMaxTunnelDepth, isEnding);
                heart.draw();
            });

            if (collapseVal > 0) {
                photos3D.forEach(photo => photo.drawAsSwarmParticle(collapseVal));
            }
            if (collapseVal > 0.1) {
                drawFinalHeroHeart(collapseVal);
            }
            requestAnimationFrame(runEngine);
        }
        runEngine();
    </script>

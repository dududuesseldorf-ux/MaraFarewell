<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9-Month Keepsake | Memory Streak</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght=0,400;0,600;1,400&family=Reenie+Beanie&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Include Supabase Client Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #FAF7F2;
            color: #1E293B;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* Persistent Navigation Bar matching gallery.html */
        .header-safe-zone {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100000;
            background: linear-gradient(to bottom, #FAF7F2 70%, rgba(250,247,242,0) 100%);
            padding-bottom: 20px;
        }

        .container {
            max-width: 900px;
            margin: 220px auto 100px auto;
            padding: 0 40px;
            box-sizing: border-box;
        }

        /* Dynamic Streak Center - Restored Elegance Layout */
        .streak-card {
            text-align: center;
            margin-bottom: 80px;
        }
        .streak-label {
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.85rem;
            color: #64748B;
            font-weight: 500;
        }
        .streak-number {
            font-family: 'Playfair Display', serif;
            font-size: 6rem;
            font-weight: 400;
            color: #1E293B;
            margin: 10px 0;
        }
        .timer-display {
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            color: #64748B;
            letter-spacing: 1px;
            font-weight: 400;
        }

        /* Journal Input Area - Clean Frame Aesthetic */
        .journal-form {
            background: #FFFFFF;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(15, 23, 42, 0.05);
            border-radius: 6px;
            margin-bottom: 80px;
            border: none;
        }
        .form-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 400;
            margin-top: 0;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 140px;
            border: 1px solid #E2E8F0;
            background-color: #FAF8F5;
            border-radius: 4px;
            padding: 20px;
            font-family: inherit;
            box-sizing: border-box;
            resize: vertical;
            margin-bottom: 25px;
            font-size: 1rem;
            color: #1E293B;
            outline: none;
            transition: border-color 0.2s;
        }
        textarea:focus {
            border-color: #C5A880;
        }
        .form-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        .btn-secondary {
            border: 1px solid #1E293B;
            color: #1E293B;
            background-color: transparent;
            padding: 12px 24px;
            border-radius: 4px;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-secondary:hover {
            background-color: #1E293B;
            color: #FFFFFF;
        }
        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }
        .btn-primary {
            background: #1E293B;
            color: #FFFFFF;
            border: none;
            padding: 14px 36px;
            border-radius: 4px;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-primary:hover {
            opacity: 0.9;
        }
        .btn-primary:disabled {
            background: #94A3B8;
            cursor: not-allowed;
        }
        #file-preview {
            font-size: 0.85rem;
            color: #64748B;
            margin-left: 15px;
            font-family: 'Inter', sans-serif;
        }

        /* Shared Timeline Feed matching 3x3 Frame Aesthetic */
        .feed-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 400;
            margin-bottom: 40px;
            text-align: center;
        }
        #global-timeline-feed {
            display: flex;
            flex-direction: column;
            gap: 50px;
        }
        .entry-card {
            background: #FFFFFF;
            padding: 30px 30px 45px 30px;
            box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
        }
        .entry-meta {
            font-size: 0.85rem;
            color: #94A3B8;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        .entry-text {
            font-size: 1.1rem;
            line-height: 1.7;
            color: #334155;
            margin-bottom: 10px;
        }
        .img-container-blueprint {
            width: 100%;
            margin-top: 20px;
            background-color: #F3EFE6;
            border-radius: 4px;
            overflow: hidden;
        }
        .entry-image {
            width: 100%;
            height: auto;
            max-height: 600px;
            object-fit: cover;
            display: block;
        }

        @media (max-width: 768px) {
            .container { margin-top: 160px; padding: 0 20px; }
            .streak-number { font-size: 4rem; }
            .entry-card { padding: 20px 20px 30px 20px; }
        }
    </style>
</head>
<body>

    <!-- Persistent Header Navigation Bar -->
    <div class="header-safe-zone">
        <nav class="floating-nav">
            <a href="index.html" class="nav-link">Home</a>
            <a href="gallery.html" class="nav-link">Gallery</a>
            <a href="streak.html" class="nav-link active">Daily Journal</a>
            <a href="videos.html" class="nav-link">Videos</a>
            <a href="messages.html" class="nav-link">Messages</a>
        </nav>
    </div>

    <div class="container">
        <!-- Streak Header Component -->
        <div class="streak-card">
            <div class="streak-label">Our Memory Streak</div>
            <div class="streak-number" id="streak-count">0 Days</div>
            <div class="timer-display" id="streak-timer">Calculating running milestone...</div>
        </div>

        <!-- Clean Form Frame Wrapper -->
        <div class="journal-form">
            <h3 class="form-title">Write a New Entry</h3>
            <textarea id="journal-input" placeholder="What's on your mind today? Share a moment..."></textarea>
            
            <div class="form-actions">
                <div class="upload-btn-wrapper">
                    <button class="btn-secondary">📎 Add Photo</button>
                    <input type="file" id="image-input" accept="image/*" />
                    <span id="file-preview"></span>
                </div>
                <button class="btn-primary" id="submit-entry-btn" onclick="saveNewCloudEntry()">Publish Memory</button>
            </div>
        </div>

        <h3 class="feed-title">Our Shared Memories Timeline</h3>
        <div id="global-timeline-feed">Loading permanent sync timeline...</div>
    </div>

    <script>
        // REPLACE WITH YOUR EXACT SUPABASE DATA CODES
        const SUPABASE_URL = "https://ajrckjjhcgrojvnbewyv.supabase.co/rest/v1/"; 
        const SUPABASE_ANON_KEY = "sb_publishable_tKDei5cRejpJpmH23_pTmA_csT6IbSj";
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let selectedImageFile = null;

        document.getElementById('image-input').addEventListener('change', function(e) {
            if(e.target.files.length > 0) {
                selectedImageFile = e.target.files[0];
                document.getElementById('file-preview').innerText = `Selected: ${selectedImageFile.name}`;
            }
        });

        function updateStreakAndTimer(entries) {
            const streakElement = document.getElementById('streak-count');
            const timerElement = document.getElementById('streak-timer');

            if (!entries || entries.length === 0) {
                streakElement.innerText = "0 Days";
                timerElement.innerText = "Post a memory to begin our streak!";
                return;
            }

            const dates = entries.map(e => new Date(e.created_at)).sort((a,b) => b - a);
            const newestEntryDate = dates[0];
            let currentStreak = 0;
            let checkDate = new Date();
            
            const getDayString = (d) => d.toISOString().split('T')[0];
            const postedDaysSet = new Set(entries.map(e => getDayString(new Date(e.created_at))));

            while (postedDaysSet.has(getDayString(checkDate))) {
                currentStreak++;
                checkDate.setDate(checkDate.getDate() - 1);
            }

            if (currentStreak === 0) {
                let yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                while (postedDaysSet.has(getDayString(yesterday))) {
                    currentStreak++;
                    yesterday.setDate(yesterday.getDate() - 1);
                }
            }

            streakElement.innerText = `${currentStreak} Day${currentStreak === 1 ? '' : 's'}`;

            function tickCountdown() {
                const innerNow = new Date();
                const deadline = new Date(newestEntryDate.getTime() + (24 * 60 * 60 * 1000));
                const remainingMs = deadline - innerNow;

                if (remainingMs <= 0) {
                    timerElement.innerText = "Streak Expired! Post now to start fresh.";
                } else {
                    const hours = Math.floor(remainingMs / (1000 * 60 * 60));
                    const minutes = Math.floor((remainingMs % (1000 * 60 * 60)) / (1000 * 60));
                    const seconds = Math.floor((remainingMs % (1000 * 60)) / 1000);
                    timerElement.innerText = `Streak expires in: ${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
                }
            }
            tickCountdown();
            setInterval(tickCountdown, 1000);
        }

        async function fetchLiveTimelineFeed() {
            const feedContainer = document.getElementById('global-timeline-feed');
            
            const { data: entries, error } = await supabase
                .from('journal_entries')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                feedContainer.innerHTML = `<p style="color:red; text-align:center;">Sync Connection Idle. Check API settings configuration.</p>`;
                return;
            }

            updateStreakAndTimer(entries);

            if (entries.length === 0) {
                feedContainer.innerHTML = `<p style="color:#64748B; text-align:center; font-family:'Playfair Display'; font-style:italic;">Our timeline is empty. Write something beautiful above to begin.</p>`;
                return;
            }

            feedContainer.innerHTML = entries.map(item => {
                const formattedDate = new Date(item.created_at).toLocaleDateString(undefined, {
                    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit'
                });
                
                return `
                    <div class="entry-card">
                        <div class="entry-meta">${formattedDate}</div>
                        <div class="entry-text">${escapeHtml(item.text_content)}</div>
                        ${item.image_url ? `<div class="img-container-blueprint"><img src="${item.image_url}" class="entry-image"></div>` : ''}
                    </div>
                `;
            }).join('');
        }

        function escapeHtml(text) {
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        // Helper fallback converter to process images directly to base64 strings if ImgBB fails
        function convertFileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        async function saveNewCloudEntry() {
            const inputField = document.getElementById('journal-input');
            const submitBtn = document.getElementById('submit-entry-btn');
            const textContent = inputField.value.trim();

            if (!textContent && !selectedImageFile) {
                alert("Please add some text or attach an image first!");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = "Publishing...";

            let finalUploadedImageUrl = null;

            if (selectedImageFile) {
                try {
                    const formData = new FormData();
                    formData.append('image', selectedImageFile);
                    
                    // Direct free ImgBB anonymous API target (replace key= parameter if you have a custom key)
                    const uploadResponse = await fetch('https://api.imgbb.com/1/upload?key=cddc7b1bac50157a77c662e1916eb453', {
                        method: 'POST',
                        body: formData
                    });
                    
                    const uploadResult = await uploadResponse.json();
                    if (uploadResult.success && uploadResult.data && uploadResult.data.url) {
                        finalUploadedImageUrl = uploadResult.data.url;
                    } else {
                        // High-reliability Fallback: Convert to Base64 data string directly if web API rejects execution
                        finalUploadedImageUrl = await convertFileToBase64(selectedImageFile);
                    }
                } catch (imgErr) {
                    console.warn("External image hosting failed. Reverting to structural fallback compression...");
                    try {
                        finalUploadedImageUrl = await convertFileToBase64(selectedImageFile);
                    } catch(b64err) {
                        console.error("Total image compilation crash: ", b64err);
                    }
                }
            }

            // Database write submission execution block
            const { error } = await supabase
                .from('journal_entries')
                .insert([
                    { text_content: textContent || "Shared Photo Update", image_url: finalUploadedImageUrl }
                ]);

            if (error) {
                alert("Database Error: " + error.message);
            } else {
                inputField.value = "";
                selectedImageFile = null;
                document.getElementById('file-preview').innerText = "";
                document.getElementById('image-input').value = "";
                await fetchLiveTimelineFeed();
            }

            submitBtn.disabled = false;
            submitBtn.innerText = "Publish Memory";
        }

        // Auto initialization call
        fetchLiveTimelineFeed();
    </script>
</body>
</html>

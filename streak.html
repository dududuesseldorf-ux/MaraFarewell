<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Photo Streak</title>
    <!-- Include Supabase CDN Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #ff4757;
            --bg: #f1f2f6;
            --card-bg: #ffffff;
            --text: #2f3542;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            max-width: 600px;
        }

        h1 { margin-bottom: 5px; color: var(--primary); }
        p { margin: 5px 0; color: #57606f; }

        .streak-container {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
            width: 100%;
            max-width: 500px;
            margin-bottom: 30px;
            box-sizing: border-box;
        }

        .streak-count {
            font-size: 3rem;
            font-weight: bold;
            color: var(--primary);
            margin: 10px 0;
        }

        .timer {
            font-size: 1.1rem;
            font-weight: 600;
            color: #2f3542;
            background: #e4e7eb;
            padding: 8px 15px;
            border-radius: 20px;
            display: inline-block;
        }

        .upload-section {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
            margin-bottom: 40px;
        }

        .upload-box {
            border: 2px dashed #ced6e0;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }

        .upload-box:hover { border-color: var(--primary); }
        
        #imageInput { display: none; }

        #previewContainer {
            margin-top: 15px;
            display: none;
        }

        #previewImage {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            object-fit: cover;
        }

        textarea {
            width: 100%;
            height: 80px;
            padding: 10px;
            border: 1px solid #ced6e0;
            border-radius: 8px;
            resize: none;
            box-sizing: border-box;
            margin-bottom: 15px;
            font-family: inherit;
        }

        button {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background: #ff6b81; }
        button:disabled { background: #ced6e0; cursor: not-allowed; }

        .feed-container {
            width: 100%;
            max-width: 500px;
        }

        .feed-title {
            font-size: 1.3rem;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .post-card {
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            overflow: hidden;
        }

        .post-date {
            padding: 12px 15px;
            font-size: 0.85rem;
            color: #747d8c;
            background: #f8f9fa;
            border-bottom: 1px solid #f1f2f6;
        }

        .post-image {
            width: 100%;
            display: block;
            max-height: 500px;
            object-fit: cover;
        }

        .post-text {
            padding: 15px;
            font-size: 0.95rem;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <header>
        <h1>Global Snap Streak</h1>
        <p>Your personal streak tracker connected to a shared global feed! Upload a photo daily.</p>
    </header>

    <!-- Streak Tracker (Stored locally for your specific device) -->
    <div class="streak-container">
        <div>Your Personal Streak</div>
        <div class="streak-count" id="streakDisplay">🔥 0</div>
        <div class="timer" id="timerDisplay">Loading timer...</div>
    </div>

    <!-- Upload Form -->
    <div class="upload-section">
        <h3 style="margin-top:0;">Upload Today's Photo</h3>
        
        <div class="upload-box" onclick="document.getElementById('imageInput').click()">
            <span id="uploadPrompt">📸 Click to select a photo</span>
            <input type="file" id="imageInput" accept="image/*">
            <div id="previewContainer">
                <img id="previewImage" src="" alt="Preview">
            </div>
        </div>

        <textarea id="textInput" placeholder="Add a caption... (optional)"></textarea>
        <button id="uploadBtn" onclick="uploadPost()">Upload & Post Globally</button>
    </div>

    <!-- Global Feed (Visible to all users) -->
    <div class="feed-container">
        <div class="feed-title">Global Live Feed</div>
        <div id="feed">Loading feed from database...</div>
    </div>

    <script>
        // --- DATABASE CONNECTION CONFIG ---
        const SUPABASE_URL = "https://kliuqjavxsvxrykpgxxe.supabase.co/rest/v1//"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtsaXVxamF2eHN2eHJ5a3BneHhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3ODY4MjUsImV4cCI6MjA5OTM2MjgyNX0.GL0QC_f867jfZU28BxfKkU74rv1NmmQJIh-UxdnIYc8";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- LOCAL STREAK CACHE ---
        let localData = JSON.parse(localStorage.getItem('userStreakData')) || {
            streak: 0,
            lastUploadDate: null
        };

        function saveLocalData() {
            localStorage.setItem('userStreakData', JSON.stringify(localData));
        }

        // --- DOM Elements ---
        const imageInput = document.getElementById('imageInput');
        const previewContainer = document.getElementById('previewContainer');
        const previewImage = document.getElementById('previewImage');
        const uploadPrompt = document.getElementById('uploadPrompt');
        const textInput = document.getElementById('textInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const streakDisplay = document.getElementById('streakDisplay');
        const timerDisplay = document.getElementById('timerDisplay');
        const feed = document.getElementById('feed');

        let selectedImageBase64 = "";

        // --- Image Selection File Processing ---
        imageInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                // Compress/Limit file sizes so database uploads stay quick
                if (file.size > 2 * 1024 * 1024) { 
                    alert("Please choose a photo under 2MB.");
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(e) {
                    selectedImageBase64 = e.target.result;
                    previewImage.src = selectedImageBase64;
                    previewContainer.style.display = 'block';
                    uploadPrompt.style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        });

        function getTodayString() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        function getYesterdayString() {
            const d = new Date();
            d.setDate(d.getDate() - 1);
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        // --- Manage Streak Validation Engine ---
        function checkStreakStatus() {
            const today = getTodayString();
            const yesterday = getYesterdayString();

            if (!localData.lastUploadDate) {
                localData.streak = 0;
            } else if (localData.lastUploadDate === today || localData.lastUploadDate === yesterday) {
                // Streak is safe
            } else {
                // Missed deadline window
                localData.streak = 0;
            }
            saveLocalData();
            updateUI();
        }

        function updateUI() {
            streakDisplay.innerText = `🔥 ${localData.streak}`;
            const today = getTodayString();

            if (localData.lastUploadDate === today) {
                uploadBtn.disabled = true;
                uploadBtn.innerText = "Streak Secured For Today!";
                imageInput.disabled = true;
            } else {
                uploadBtn.disabled = false;
                uploadBtn.innerText = "Upload & Post Globally";
                imageInput.disabled = false;
            }
        }

        // --- Live Clock Counter Engine ---
        function runCountdown() {
            const now = new Date();
            const todayStr = getTodayString();
            const nextMidnight = new Date();
            nextMidnight.setHours(24, 0, 0, 0); 

            let displayMessage = (localData.lastUploadDate === todayStr) 
                ? "Next upload unlocks in: " 
                : "Time left to save streak: ";

            const diff = nextMidnight - now;

            if (diff <= 0) {
                checkStreakStatus();
                return;
            }

            const hours = String(Math.floor((diff / (1000 * 60 * 60)) % 24)).padStart(2, '0');
            const minutes = String(Math.floor((diff / (1000 * 60)) % 60)).padStart(2, '0');
            const seconds = String(Math.floor((diff / 1000) % 60)).padStart(2, '0');

            timerDisplay.innerText = `${displayMessage} ${hours}:${minutes}:${seconds}`;
        }

        // --- DATABASE OPERATIONS (WRITE & READ) ---

        // 1. Fetch Global feed for everyone
        async function fetchGlobalFeed() {
            const { data, error } = await _supabase
                .from('global_streaks')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error("Error reading live feed:", error);
                return;
            }

            feed.innerHTML = "";
            if (!data || data.length === 0) {
                feed.innerHTML = "<p style='text-align:center; color:#747d8c;'>No photos uploaded globally yet.</p>";
                return;
            }

            data.forEach(post => {
                const card = document.createElement('div');
                card.className = 'post-card';
                
                // Parse date timestamp beautifully
                const formattedDate = new Date(post.created_at).toLocaleString();
                let textHTML = post.caption ? `<div class="post-text">${post.caption}</div>` : '';

                card.innerHTML = `
                    <div class="post-date">${formattedDate}</div>
                    <img class="post-image" src="${post.image_url}" alt="Global Snap">
                    ${textHTML}
                `;
                feed.appendChild(card);
            });
        }

        // 2. Insert new post to live feed
        async function uploadPost() {
            if (!selectedImageBase64) {
                alert("Please pick a picture first!");
                return;
            }

            uploadBtn.disabled = true;
            uploadBtn.innerText = "Publishing to Feed...";

            // Send payload data directly to server database 
            const { error } = await _supabase
                .from('global_streaks')
                .insert([
                    { image_url: selectedImageBase64, caption: textInput.value.trim() }
                ]);

            if (error) {
                alert("Database submission failed: " + error.message);
                uploadBtn.disabled = false;
                updateUI();
                return;
            }

            // If DB insert is successful, progress user streak
            localData.streak += 1;
            localData.lastUploadDate = getTodayString();
            saveLocalData();

            // Clear layout interface
            selectedImageBase64 = "";
            previewImage.src = "";
            previewContainer.style.display = 'none';
            uploadPrompt.style.display = 'block';
            textInput.value = "";
            imageInput.value = "";

            updateUI();
            fetchGlobalFeed(); // Instantly update view feed items
        }

        // Initialize App Ecosystem
        checkStreakStatus();
        fetchGlobalFeed();
        setInterval(runCountdown, 1000);
        runCountdown();
    </script>
</body>
</html>

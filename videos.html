    <style>


        
        .theater-layout {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: calc(50px * var(--scaling-factor)) calc(40px * var(--scaling-factor));
            align-items: start;
        }

        .card-widescreen {
            grid-column: span 2;
            max-width: calc(850px * var(--scaling-factor));
            justify-self: center;
        }

        .cinema-card {
            background: #FFFFFF;
            padding: calc(20px * var(--scaling-factor)) calc(20px * var(--scaling-factor)) calc(24px * var(--scaling-factor)) calc(20px * var(--scaling-factor));
            box-shadow: 0 calc(25px * var(--scaling-factor)) calc(70px * var(--scaling-factor)) rgba(15, 23, 42, 0.08);
            border-radius: calc(6px * var(--scaling-factor)); 
            overflow: hidden;
            transition: box-shadow 0.4s, transform 0.4s;
            height: fit-content; 
            width: 100%;
            display: flex;
            flex-direction: column;
            border: none;
            box-sizing: border-box;
        }
        
        .cinema-card:hover {
            transform: translateY(calc(-6px * var(--scaling-factor)));
            box-shadow: 0 calc(35px * var(--scaling-factor)) calc(80px * var(--scaling-factor)) rgba(214, 175, 55, 0.25);
        }

        .video-canvas {
            position: relative;
            width: 100%;
            background-color: #F3EFE6; 
            cursor: pointer;
            overflow: hidden;
            border-radius: calc(4px * var(--scaling-factor));
        }
        .video-canvas.ratio-16-9 { aspect-ratio: 16 / 9; }
        .video-canvas.ratio-9-16 { aspect-ratio: 9 / 16; }

        .video-canvas video {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
        }
        
        .video-overlay {
            position: absolute;
            inset: 0;
            background: rgba(250, 247, 242, 0.15);
            backdrop-filter: blur(2px);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s, backdrop-filter 0.4s;
            z-index: 2;
        }
        .video-canvas.is-playing .video-overlay {
            opacity: 0;
            pointer-events: none;
            backdrop-filter: blur(0px);
        }
        
        .cinema-play-btn {
            width: calc(65px * var(--scaling-factor)); 
            height: calc(65px * var(--scaling-factor));
            background: #1E293B;
            border-radius: 50%;
            display: flex; 
            align-items: center; 
            justify-content: center;
            color: #FAF7F2; 
            font-size: calc(22px * var(--scaling-factor)); 
            padding-left: calc(4px * var(--scaling-factor));
            box-shadow: 0 calc(10px * var(--scaling-factor)) calc(30px * var(--scaling-factor)) rgba(0, 0, 0, 0.15);
            transition: transform 0.3s, background-color 0.3s, color 0.3s;
        }
        .cinema-card:hover .cinema-play-btn {
            transform: scale(1.1);
            background-color: #D6AF37;
            color: #FFFFFF;
        }

        .cinema-details { 
            padding: calc(18px * var(--scaling-factor)) 0 calc(4px * var(--scaling-factor)) 0; 
            background: transparent;
            text-align: center;
        }
        .cinema-details h3 { 
            font-family: 'Reenie Beanie', cursive;
            font-size: calc(36px * var(--scaling-factor)); 
            font-weight: 400;
            color: #1E293B;
            line-height: 1.1;
            margin: 0;
        }

        .cinema-card.coming-soon {
            border: calc(2px * var(--scaling-factor)) dashed #E2E8F0;
            background: rgba(255, 255, 255, 0.5);
            box-shadow: none;
        }
        .cinema-card.coming-soon:hover {
            border-color: #D6AF37;
            background: #FFFFFF;
            box-shadow: 0 calc(25px * var(--scaling-factor)) calc(70px * var(--scaling-factor)) rgba(15, 23, 42, 0.05);
        }
        .coming-soon-canvas {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: calc(15px * var(--scaling-factor));
            background: linear-gradient(-45deg, #FDFBF7, #F3EFE6, #FAF7F2, #F3EFE6);
            background-size: 400% 400%;
            animation: gradientAmbient 12s ease infinite;
        }
        .coming-soon-icon {
            font-size: calc(35px * var(--scaling-factor));
            color: rgba(30, 41, 59, 0.15);
        }
        .coming-soon-badge {
            background: transparent;
            border: calc(1px * var(--scaling-factor)) solid #D6AF37;
            color: #D6AF37;
            padding: calc(4px * var(--scaling-factor)) calc(14px * var(--scaling-factor));
            border-radius: calc(50px * var(--scaling-factor));
            font-size: calc(12px * var(--scaling-factor));
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: calc(1px * var(--scaling-factor));
        }

        @keyframes gradientAmbient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>

    <script>
        function updateScaling() {
            const baseWidth = window.innerWidth < 768 ? 430 : 1440;
            const factor = window.innerWidth / baseWidth;
            document.documentElement.style.setProperty('--scaling-factor', factor);
        }
        window.addEventListener('resize', updateScaling);
        window.addEventListener('DOMContentLoaded', updateScaling);
        updateScaling();

        function toggleVideo(canvas) {
            const currentVideo = canvas.querySelector('video');
            if (!currentVideo) return;
            if (currentVideo.paused) {
                document.querySelectorAll('.video-canvas video').forEach(otherVideo => {
                    if (otherVideo !== currentVideo && !otherVideo.paused) {
                        otherVideo.pause();
                    }
                });
                currentVideo.play();
                canvas.classList.add('is-playing');
            } else {
                currentVideo.pause();
                canvas.classList.remove('is-playing');
            }
        }
    </script>

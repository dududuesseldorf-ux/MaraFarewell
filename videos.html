<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9-Month Chronicle | Videos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:ital,wght@0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background-color: #0F172A; color: #FFFFFF; }
        .page-header h1 { color: #FFFFFF; }
        .page-subtitle { color: #9CA3AF; }
        
        .theater-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 40px;
            max-width: 900px;
            margin: 0 auto;
        }
        .cinema-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            transition: border-color 0.4s, transform 0.4s;
        }
        .cinema-card:hover {
            border-color: var(--gold);
            transform: translateY(-4px);
        }
        .video-canvas {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
        }
        .video-canvas img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
            transition: opacity 0.4s;
        }
        .cinema-card:hover .video-canvas img { opacity: 0.5; }
        
        .cinema-play-btn {
            position: absolute;
            inset: 0; margin: auto;
            width: 70px; height: 70px;
            background: #FFFFFF;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #0F172A; font-size: 1.5rem; padding-left: 4px;
            box-shadow: 0 0 30px rgba(214, 175, 55, 0.3);
            transition: transform 0.3s, background-color 0.3s;
        }
        .cinema-card:hover .cinema-play-btn {
            transform: scale(1.1);
            background-color: var(--gold);
            color: #0F172A;
        }
        .cinema-details { padding: 25px; background: rgba(15, 23, 42, 0.4); }
        .cinema-details h3 { font-family: var(--font-heading); font-size: 1.4rem; color: #FFFFFF; }
        .cinema-details p { color: #9CA3AF; font-size: 0.95rem; margin-top: 4px; }
    </style>
</head>
<body>

    <nav class="floating-nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="gallery.html" class="nav-link">Gallery</a>
        <a href="videos.html" class="nav-link active">Videos</a>
        <a href="streak.html" class="nav-link">Daily Journal</a>
        <a href="messages.html" class="nav-link">Messages</a>
    </nav>

    <header class="page-header">
        <h1>Moving Tapes</h1>
        <p class="page-subtitle">Hit play to hear our voices and watch our best memories back.</p>
    </header>

    <main class="content-container">
        <div class="theater-layout">
            <div class="cinema-card">
                <div class="video-canvas">
                    <img src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30?q=80&w=900" alt="Funny Compilation">
                    <div class="cinema-play-btn"><i class="fas fa-play"></i></div>
                </div>
                <div class="cinema-details">
                    <h3>The Farewell Video Box</h3>
                    <p>A collection of individual video messages recorded by everyone wishing you luck on this 9-month chapter.</p>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
